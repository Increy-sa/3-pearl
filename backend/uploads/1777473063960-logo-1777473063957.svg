<svg width="200" height="150" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimalist Panda Head -->
  <!-- Ears (drawn first to appear behind head) -->
  <circle cx="70" cy="25" r="15" fill="#4A4A4A"/>
  <circle cx="130" cy="25" r="15" fill="#4A4A4A"/>

  <!-- Head with subtle border using #BFBFBF -->
  <circle cx="100" cy="50" r="40" fill="#E0E0E0" stroke="#BFBFBF" stroke-width="1"/>

  <!-- Eye Patches -->
  <ellipse cx="85" cy="45" rx="10" ry="15" transform="rotate(-15 85 45)" fill="#4A4A4A"/>
  <ellipse cx="115" cy="45" rx="10" ry="15" transform="rotate(15 115 45)" fill="#4A4A4A"/>

  <!-- Nose (teal accent) -->
  <ellipse cx="100" cy="65" rx="5" ry="3" fill="#00796B"/>

  <!-- Text "باندا" -->
  <text x="100" y="120" font-family="Arial, sans-serif" font-size="30" text-anchor="middle" fill="#4A4A4A">باندا</text>
</svg>