<svg width="300" height="100" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .text-style {
        font-family: 'Arial', sans-serif;
        font-size: 40px;
        font-weight: bold;
        direction: rtl;
        unicode-bidi: embed;
      }
    </style>
  </defs>

  <!-- Symbol: Abstract Node / Hub, representing connection -->
  <!-- Central node (dark grey) -->
  <circle cx="50" cy="50" r="6" fill="#212529"/>

  <!-- Branch 1 (blue) -->
  <line x1="50" y1="50" x2="30" y2="35" stroke="#007BFF" stroke-width="4" stroke-linecap="round"/>
  <!-- Branch 2 (purple) -->
  <line x1="50" y1="50" x2="30" y2="65" stroke="#6F42C1" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Text: "كونِكتك" (dark grey) -->
  <text x="85" y="60" text-anchor="start" class="text-style" fill="#212529">
    كونِكتك
  </text>
</svg>