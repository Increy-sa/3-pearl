<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .primary { fill: #F5F5F5; }
    .secondary { fill: #A16207; }
    .accent { fill: #EAB308; }
    .text { font-family: 'Arial', sans-serif; font-size: 24px; font-weight: bold; }
  </style>

  <!-- Icon: Stylized Circuit Node -->
  <g transform="translate(100, 80)">
    <circle cx="0" cy="0" r="15" class="secondary"/>
    <circle cx="0" cy="0" r="8" class="primary"/>
    <path d="M 0,-15 L 0,-30" stroke="#A16207" stroke-width="4" stroke-linecap="round"/>
    <path d="M 0,15 L 0,30" stroke="#A16207" stroke-width="4" stroke-linecap="round"/>
    <path d="M -15,0 L -30,0" stroke="#A16207" stroke-width="4" stroke-linecap="round"/>
    <path d="M 15,0 L 30,0" stroke="#A16207" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="5" class="accent"/>
  </g>

  <!-- Brand Name: فيرتيجو (Vertigo) -->
  <text x="50%" y="160" text-anchor="middle" class="text primary">
    فيرتيجو (Vertigo)
  </text>
</svg>