<svg width="280" height="100" viewBox="0 0 280 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Symbol: Two overlapping, slightly offset and rotated squares, representing structure, layers, and style -->
  <g transform="translate(45, 50)">
    <!-- Main square in primary dark color -->
    <rect x="-20" y="-20" width="40" height="40" rx="4" fill="#2C3E50" transform="rotate(-5)"/>
    <!-- Overlapping square in accent taupe color -->
    <rect x="-10" y="-10" width="40" height="40" rx="4" fill="#B8A580" transform="rotate(10)"/>
  </g>

  <!-- Text "نَسَق" (Nasq) in primary dark color -->
  <!-- Using a generic Arabic font stack for broad compatibility in SVG text elements -->
  <text x="105" y="60" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif, 'Noto Naskh Arabic', 'Scheherazade', 'Amiri'" font-size="40" font-weight="bold" fill="#2C3E50" direction="rtl">نَسَق</text>
</svg>