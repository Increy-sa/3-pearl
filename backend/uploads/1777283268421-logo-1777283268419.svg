<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .primary { fill: #C8A67A; }
      .secondary { fill: #1E2A30; }
      .accent { fill: #F5F5DC; }
      .text { font-family: 'Arial', sans-serif; font-weight: bold; }
    </style>
  </defs>

  <!-- Icon: Abstract Hanger -->
  <g transform="translate(50, 50)">
    <path d="M50 0 L50 20 L20 20 L20 40 L80 40 L80 20 L50 20 Z" class="primary" transform="scale(1, -1)"/>
    <rect x="40" y="40" width="20" height="10" rx="2" class="primary"/>
  </g>

  <!-- Brand Name -->
  <text x="100" y="100" dominant-baseline="middle" text-anchor="middle" class="text secondary" font-size="30">صَدى</text>
</svg>