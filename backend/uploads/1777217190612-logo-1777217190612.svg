<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .primary { fill: #1A2E40; }
      .secondary { fill: #4A6B8C; }
      .accent { fill: #B7C6D9; }
      .text { font-family: 'Arial', sans-serif; font-weight: bold; }
    </style>
  </defs>

  <!-- Icon: Abstract circuit board trace -->
  <g transform="translate(50, 50)">
