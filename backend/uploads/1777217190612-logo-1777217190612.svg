    <circle cx="25" cy="25" r="8" class="accent"/>
    <circle cx="45" cy="15" r="8" class="accent"/>
    <circle cx="45" cy="45" r="8" class="accent"/>
    <circle cx="65" cy="35" r="8" class="accent"/>
  </g>

  <!-- Brand Name -->
  <text x="100" y="105" text-anchor="middle" class="text primary" font-size="24">Luminaryte</text>
</svg>