<svg width="480" height="100" viewBox="0 0 480 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon Group: Stylized 'V' as a circuit trace connecting to a component node -->
  <g transform="translate(30, 10)">
    <!-- 'V' shape formed by a path, representing circuit lines -->
    <path d="M0 0 L40 70 L80 0" fill="none" stroke="#0A1F1F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Square node at the base of the 'V', representing an electronic component or connection point -->
    <rect x="32" y="62" width="16" height="16" fill="#B76E79"/>
  </g>
  
  <!-- Text: "Veridian Labs" -->
  <text x="140" y="50" font-family="sans-serif" font-size="45" fill="#0A1F1F" dominant-baseline="middle">Veridian Labs</text>
</svg>