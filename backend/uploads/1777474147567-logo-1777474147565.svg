<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120">
  <g text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <!-- Coffee Bean Shape -->
    <path d="M 100 20 C 115 10, 130 25, 130 40 C 130 55, 115 70, 100 60 C 85 70, 70 55, 70 40 C 70 25, 85 10, 100 20 Z" fill="#4A2C2A"/>
    <!-- Bean Crease -->
    <path d="M 100 25 C 95 35, 105 45, 100 55" stroke="#B8936F" stroke-width="2" fill="none"/>

    <!-- Text "Heirloom" -->
    <text x="100" y="85" font-size="32" fill="#2C1A17" font-weight="bold">Heirloom</text>

    <!-- Text "Roast" -->
