<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .primary { fill: #1A237E; }
      .secondary { fill: #7986CB; }
      .accent { fill: #C5CAE9; }
      .text { fill: #1A237E; font-family: 'Roboto', sans-serif; font-weight: 500; }
    </style>
  </defs>

  <!-- Icon: Abstract circuit trace -->
  <g transform="translate(30, 30)">
    <path class="secondary" d="M0 0 L20 0 L20 20 L0 20 Z"/>
    <path class="accent" d="M20 0 L40 0 L40 20 L20 20 Z"/>
    <path class="secondary" d="M40 0 L60 0 L60 20 L40 20 Z"/>
    <path class="accent" d="M60 0 L80 0 L80 20 L60 20 Z"/>

    <path class="accent" d="M0 20 L0 40 L20 40 L20 20 Z"/>
    <path class="secondary" d="M20 20 L20 40 L40 40 L40 20 Z"/>
    <path class="accent" d="M40 20 L40 40 L60 40 L60 20 Z"/>
    <path class="secondary" d="M60 20 L60 40 L80 40 L80 20 Z"/>

    <path class="secondary" d="M0 40 L0 60 L20 60 L20 40 Z"/>
    <path class="accent" d="M20 40 L20 60 L40 60 L40 40 Z"/>
    <path class="secondary" d="M40 40 L40 60 L60 60 L60 40 Z"/>
    <path class="accent" d="M60 40 L60 60 L80 60 L80 40 Z"/>

    <path class="accent" d="M0 60 L0 80 L20 80 L20 60 Z"/>
    <path class="secondary" d="M20 60 L20 80 L40 80 L40 60 Z"/>
    <path class="accent" d="M40 60 L40 80 L60 80 L60 60 Z"/>
    <path class="secondary" d="M60 60 L60 80 L80 80 L80 60 Z"/>
  </g>

  <!-- Brand Name -->
  <text x="110" y="100" class="text" font-size="24" dominant-baseline="middle">أثيريوم</text>
  <text x="110" y="130" class="text" font-size="16" dominant-baseline="middle">(Athirium)</text>

</svg>